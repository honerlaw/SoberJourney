name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📝 Create mock .env file
        run: echo "DATABASE_URL=postgresql://user:password@localhost:5432/testdb" > packages/server/.env

      - name: 🔨 Build
        run: npm run build

      - name: 🧪 Test
        run: npm run test

